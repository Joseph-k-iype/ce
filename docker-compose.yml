version: '3.8'

services:
  # FalkorDB graph database
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - LOG_LEVEL=info
    depends_on:
      falkordb:
        condition: service_healthy
    volumes:
      - ./rules:/app/rules
      - ./data:/app/data
    command: python main.py

  # React frontend (Vite dev server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  falkordb_data:
