# Multi-architecture build support (use with docker buildx bake)
x-bake:
  default:
    platforms:
      - linux/amd64
      - linux/arm64

services:
  # FalkorDB graph database (no auth for local development)
  falkordb:
    image: falkordb/falkordb:latest
    container_name: compliance-engine-falkordb
    ports:
      - "6379:6379"
      - "3000:3000" # FalkorDB Browser UI
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend (Production Dockerfile)
  backend:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: compliance-engine-backend
    ports:
      - "5001:5001"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_USERNAME=
      - FALKORDB_PASSWORD=
      - LOG_LEVEL=info
      - JWT_SECRET_KEY=dev-jwt-secret-key
    volumes:
      - .:/app
    depends_on:
      falkordb:
        condition: service_healthy

  # React frontend (Local build served by Nginx)
  frontend:
    image: nginx:alpine
    container_name: compliance-engine-frontend
    ports:
      - "3001:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  falkordb_data:
