apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compliance-engine-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Basic setup for Nginx ingress
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Note: To enable JWT validation at the ingress level with open-source Nginx Ingress Controller, 
    # you would use an external auth service and this annotation:
    # nginx.ingress.kubernetes.io/auth-url: "http://jwt-auth-service.default.svc.cluster.local/validate"
    # Or, if using NGINX Plus, you would use:
    # nginx.org/jwt-key: "jwt-secret"
spec:
  rules:
  - host: app.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
