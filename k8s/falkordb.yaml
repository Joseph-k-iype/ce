apiVersion: v1
kind: Secret
metadata:
  name: falkordb-secret
type: Opaque
stringData:
  password: securefalkorpass123 # In production, use a secure secret manager
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: falkordb
spec:
  serviceName: "falkordb"
  replicas: 1
  selector:
    matchLabels:
      app: falkordb
  template:
    metadata:
      labels:
        app: falkordb
    spec:
      containers:
      - name: falkordb
        image: falkordb/falkordb:latest
        command: ["/bin/sh", "-c", "redis-server --requirepass $FALKORDB_PASSWORD --loadmodule /usr/lib/redis/modules/falkordb.so"]
        env:
        - name: FALKORDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: falkordb-secret
              key: password
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: falkordb-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: falkordb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: falkordb
spec:
  selector:
    app: falkordb
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falkordb-allow-backend
spec:
  podSelector:
    matchLabels:
      app: falkordb
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 6379
